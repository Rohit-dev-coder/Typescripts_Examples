<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let age = prompt("Please enter your age:"); 
        document.write(`Your age is: ${age}`);
        document.write("<br>After 10 years, you will be: " + (age + 10));
        // String concatenation will occur here, resulting in "Your age is: 20<br>After 10 years, you will be: 2010" if the user enters 20. To fix this, we need to convert 'age' to a number before adding 10.
    </script>
</head>
<body>
    
</body>
</html>
