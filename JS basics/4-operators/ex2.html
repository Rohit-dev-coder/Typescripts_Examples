<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
    <script>
        let fno = Number(prompt("Enter first number:"));
        let sno = Number(prompt("Enter second number:"));
        document.write(`${fno} > ${sno} is: ${fno > sno}`);
        document.write(`<br>${fno} < ${sno} is: ${fno < sno}`);
        document.write(`<br>${fno} >= ${sno} is: ${fno >= sno}`);
        document.write(`<br>${fno} <= ${sno} is: ${fno <= sno}`);

    </script>
</head>
<body>
    
</body>
</html>
