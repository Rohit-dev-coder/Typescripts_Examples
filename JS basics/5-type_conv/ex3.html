<!DOCTYPE html>
<html lang="en">
<head>
    <title>Type Conversion</title>
    <script>
        let total = "250";
        total = total + 1;
        document.write(total); // Output: "2501"
        total = Number(total);
        total = total + 1;
        document.write(`<br>${total}`); // Output: 2502

    </script>
</head>
<body>
    
</body>
</html>
