<!DOCTYPE html>
<html lang="en">
<head>
    <title>Type Coercion</title>
    <script>
        let x = 10;
        let y = 3;
        let z = x/y;
        document.write(`${z}<br>`);
        document.write(`${z.toFixed(2)}<br>`);
        document.write(`${typeof z.toFixed(3)}`);
</script>
</head>
<body>
    
</body>
</html>
