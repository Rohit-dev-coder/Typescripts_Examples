<!DOCTYPE html>
<html lang="en">
<head>
    <title>Type Conversion</title>
    <script>
        let total = "";
        total = Number(total)
        document.write(total); 
        total = " ";
        total = Number(total)
        document.write(`<br>${total}`);
        total = "0";
        total = Number(total)
        document.write(`<br>${total}`);
        total = "1";
        total = Number(total)
        document.write(`<br>${total}`);
    </script>
</head>
<body>
    
</body>
</html>
