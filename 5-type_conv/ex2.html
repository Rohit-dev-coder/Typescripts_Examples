<!DOCTYPE html>
<html lang="en">
<head>
    <title>Type Conversion</title>
    <script>
        window.alert("Hello");
        let result = 100;
        let sRes = window.String(result);
        document.write(result);
        document.write(`<br>${typeof result}`);
        document.write(`<br>${sRes}`);
        document.write(`<br>${typeof sRes}`);

        // even document is also an object of window,
        // so we can also write it as window.document.write()
    </script>
</head>
<body>
    
</body>
</html>
