<!DOCTYPE html>
<html lang="en">
<head>
    <title>Operators</title>
    <script>
        let a = 5;
        let b = "5";
        document.write(`${a!=b}<br>`); // Output: false, because '!=' does not compare types, only values.
        document.write(`${a!==b}<br>`); // Output: true, because '!==' compares both value and type, and here 'a' is a number while 'b' is a
        
    </script>
</head>
<body>
    
</body>
</html>
